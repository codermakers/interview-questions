<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      :root {
        --gap: 10px;
        --col-count: 3;
      }
      .container {
        overflow: hidden;
        /* display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px; */
        /* display: flex;
        flex-wrap: wrap; */
        /* gap: 10px; */
        width: 600px;
        height: 600px;
        margin: 200px auto;
        border: 1px solid #000;
        /* margin-bottom: -10px;
        margin-right: -10px; */
      }
      .item {
        --col-count: 3;
        width: calc(100% / 3 - var(--gap) * 2 / var(--col-count));
        /* height: calc(100% / 3 - var(--gap) * 2 / var(--col-count)); */

        aspect-ratio: 1 / 1;
        float: left;
        -right: var(--gap);
        -bottom: var(--gap);
        font-size: 18px;
        text-align: center;
        background-color: royalblue;
      }
      /* .item:nth-child(3n) {
        margin-right: 0;
      }
      .item:nth-child(7) {
        margin-bottom: 0;
      }
      .item:nth-child(8) {
        margin-bottom: 0;
      }
      .item:nth-child(9) {
        margin-bottom: 0;
      } */
      .round {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: red;
      }

      .triangle {
        width: 0;
        height: 0;
        border: 50px solid transparent;
        border-radius: 100%;
        border-top-color: red;
      }
      .sector {
        width: 0;
        height: 0;
        border: 100px solid transparent;
        border-radius: 50%;
        border-top-color: red;
      }
    </style>
  </head>
  <body>
    <button>Click Me</button>
    <!-- <div class="container">
      <div class="round"></div>
      <div class="arrow"></div>
      <div class="triangle"></div>
      <div class="sector"></div>
      <div class="border-1px">1</div>
    </div> -->

    <div class="container">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
      <div class="item">4</div>
      <div class="item">5</div>
      <div class="item">6</div>
      <div class="item">7</div>
      <div class="item">8</div>
      <div class="item">9</div>
    </div>
  </body>
</html>
